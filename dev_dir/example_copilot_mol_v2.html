<!DOCTYPE html>
<html>

<head>
    <title>3D Molecule Viewer with Atom Labels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.2/3Dmol-min.js"></script>
    <style>
        /* 既存のスタイルはそのまま */
        .container {
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .viewer {
            width: 100%;
            height: 500px;
            position: relative;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            margin-bottom: 20px;
            background-clip: padding-box;
            overflow: hidden;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        select,
        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin: 0 5px;
        }

        label {
            font-weight: bold;
        }

        #molLabel {
            font-family: monospace;
            min-width: 7ch;
            display: inline-block;
            text-align: right;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .nav-button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-button:hover {
            background: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="controls">
            <div class="control-row">
                <label for="molSlider">Molecule:</label>
                <input type="range" id="molSlider" min="0" value="0" step="1" style="width: 200px;">
                <span id="molLabel"></span>
                <div class="nav-buttons">
                    <button class="nav-button" id="prevMol">←</button>
                    <button class="nav-button" id="nextMol">→</button>
                </div>
            </div>
            <div class="control-row">
                <label for="styleSelect">Style:</label>
                <select id="styleSelect">
                    <option value="ball and stick">Ball and Stick</option>
                    <option value="stick">Stick</option>
                    <option value="sphere">Sphere</option>
                    <option value="line">Line</option>
                </select>
                <label for="bgColor">Background:</label>
                <select id="bgColor">
                    <option value="white">White</option>
                    <option value="black">Black</option>
                    <option value="#1a1a1a">Dark Gray</option>
                </select>
                <label for="labelSelect">Atom Labels:</label>
                <select id="labelSelect">
                    <option value="none">None</option>
                    <option value="number">Number</option>
                    <option value="symbol">Symbol</option>
                    <option value="number_and_symbol">Number and Symbol</option>
                </select>
            </div>
        </div>
        <div id="viewer" class="viewer"></div>
    </div>

        // 原子番号のマッピングを追加
        const atomicNumbers = {
            "H": 1,
            "He": 2,
            "Li": 3,
            "Be": 4,
            "B": 5,
            "C": 6,
            "N": 7,
            "O": 8,
            "F": 9,
            "Ne": 10
        };

        // ラベルをクリアする関数
        function clearAllLabels() {
            viewer.removeAllLabels();
        }

        // ラベルを追加する関数
        function addLabels(model, option) {
            if (option === "none") return;

            const atoms = model.selectedAtoms({});
            atoms.forEach(atom => {
                let text = '';
                if (option === "number") {
                    text = atomicNumbers[atom.elem] || '';
                } else if (option === "symbol") {
                    text = atom.elem;
                } else if (option === "number_and_symbol") {
                    const atomicNum = atomicNumbers[atom.elem] || '';
                    text = `${atomicNum} ${atom.elem}`;
                }

                if (text) {
                    viewer.addLabel(text, {
                        position: { x: atom.x, y: atom.y, z: atom.z },
                        fontSize: 12,
                        backgroundColor: "white",
                        fontColor: "black",
                        showBackground: true,
                        alignment: "center"
                    });
                }
            });
        }

        // updateMolecule関数を修正
        function updateMolecule(index, style) {
            index = (index + molecules.length) % molecules.length;
            molSlider.value = index;

            moleculeModels.forEach(model => model.hide());

            const model = moleculeModels[index];
            model.show();

            const styleConfig = style === "ball and stick"
                ? { stick: {}, sphere: { radius: 0.5 } }
                : { [style]: {} };
            model.setStyle({}, styleConfig);

            // ラベルをクリアして再追加
            clearAllLabels();
            const labelOption = labelSelect.value;
            addLabels(model, labelOption);

            viewer.zoomTo();
            viewer.render();

            molLabel.textContent = `${index + 1}/${molecules.length}`;
        }

        // ラベルオプション変更のイベントリスナーを追加
        labelSelect.addEventListener('change', function (e) {
            updateMolecule(parseInt(molSlider.value), styleSelect.value);
        });

        // 初期化
        molSlider.max = molecules.length - 1;
        updateMolecule(0, "ball and stick");
