<!DOCTYPE html>
<html>

<head>
    <title>3D Molecule Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.2/3Dmol-min.js"></script>
    <style>
        /* Previous styles remain the same */
        .container {
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .viewer {
            width: 100%;
            height: 500px;
            position: relative;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            margin-bottom: 20px;
            background-clip: padding-box;
            overflow: hidden;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background: rgb(240, 240, 240);
            border-radius: 8px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-right: 20px;
        }

        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        label {
            font-weight: bold;
        }

        #frameLabel {
            font-family: monospace;
            min-width: 7ch;
            text-align: right;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .nav-button,
        .toggle-button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-button:hover,
        .toggle-button:hover {
            background: #e0e0e0;
        }

        .toggle-button.active {
            background: #4CAF50;
            color: white;
        }

        .toggle-button {
            margin-left: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="controls">
            <div class="control-row">
                <label for="frameSlider">Frame:</label>
                <input type="range" id="frameSlider" min="0" value="0" step="1" style="width: 200px; padding:0;">
                <span id="frameLabel"></span>
                <div class="nav-buttons">
                    <button class="nav-button" id="prevFrame">←</button>
                    <button class="nav-button" id="nextFrame">→</button>
                </div>
                <button id="toggleAxis" class="toggle-button">Show Axis</button>
            </div>
            <div class="control-row">
                <label for="styleSelect">Style:</label>
                <select id="styleSelect">
                    <option value="ball and stick">Ball and Stick</option>
                    <option value="stick">Stick</option>
                    <option value="sphere">Sphere</option>
                    <option value="line">Line</option>
                </select>
                <label for="bgColor">Background:</label>
                <select id="bgColor">
                    <option value="#333333">Dark Gray</option>
                    <option value="white">White</option>
                    <option value="black">Black</option>
                </select>
                <!-- <label for="labelSelect">Atom Labels:</label>
                <select id="labelSelect">
                    <option value="none">None</option>
                    <option value="number">Number</option>
                    <option value="symbol">Symbol</option>
                    <option value="number_and_symbol">Number and Symbol</option>
                </select> -->
            </div>
        </div>
        <div id="viewer" class="viewer"></div>
    </div>

        // Initialize viewer and model
        const viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });
        const model = viewer.addModelsAsFrames(molcule_data, "xyz");

        // Get frame count and setup slider
        const frameCount = viewer.getNumFrames();
        const frameSlider = document.getElementById('frameSlider');
        frameSlider.max = frameCount - 1;
        // frameSlider.max = frameCount;
        // frameSlider.max = Math.max(0, frameCount - 1);

        let axisVisible = false;
        let currentLabels = [];

        function addAxis() {
            const axisLength = 5;
            const axisRadius = 0.08;  // Cylinder radius
            const axisColor = {
                x: 'rgb(255, 120, 120)',
                y: 'rgb(120, 255, 120)',
                z: 'rgb(120, 120, 255)'
            };
            const fontColor = {
                x: 'rgb(255, 60, 60)',
                y: 'rgb(60, 255, 60)',
                z: 'rgb(60, 60, 255)'
            };

            // X axis (red)
            viewer.addCylinder({
                start: { x: 0, y: 0, z: 0 },
                end: { x: axisLength, y: 0, z: 0 },
                radius: axisRadius,
                fromCap: true,
                toCap: true,
                color: axisColor.x
            });
            viewer.addLabel("X", {
                position: { x: axisLength + 0.5, y: 0, z: 0 },
                backgroundColor: 'white',
                backgroundOpacity: 0.9,
                fontColor: fontColor.x,
                borderThickness: 0.5,
                borderColor: "black",
                font: 'Arial',
                fontSize: 20,
            });

            // Y axis (green)
            viewer.addCylinder({
                start: { x: 0, y: 0, z: 0 },
                end: { x: 0, y: axisLength, z: 0 },
                radius: axisRadius,
                fromCap: true,
                toCap: true,
                color: axisColor.y
            });
            viewer.addLabel("Y", {
                position: { x: 0, y: axisLength + 0.5, z: 0 },
                backgroundColor: 'white',
                backgroundOpacity: 0.9,
                fontColor: fontColor.y,
                borderThickness: 0.5,
                borderColor: "black",
                font: 'Arial',
                fontSize: 20,
            });

            // Z axis (blue)
            viewer.addCylinder({
                start: { x: 0, y: 0, z: 0 },
                end: { x: 0, y: 0, z: axisLength },
                radius: axisRadius,
                fromCap: true,
                toCap: true,
                color: axisColor.z
            });
            viewer.addLabel("Z", {
                position: { x: 0, y: 0, z: axisLength + 0.5 },
                backgroundColor: 'white',
                backgroundOpacity: 0.9,
                fontColor: fontColor.z,
                borderThickness: 0.5,
                borderColor: "black",
                font: 'Arial',
                fontSize: 20,
            });
        }

        function removeAxis() {
            viewer.removeAllShapes();
            viewer.removeAllLabels();
            // updateAtomLabels(document.getElementById('labelSelect').value);
        }

        function clearAtomLabels() {
            currentLabels.forEach(label => viewer.removeLabel(label));
            currentLabels = [];
        }

        // Event handlers for new controls
        document.getElementById('toggleAxis').addEventListener('click', function () {
            axisVisible = !axisVisible;
            if (axisVisible) {
                addAxis();
                this.classList.add('active');
            } else {
                removeAxis();
                this.classList.remove('active');
            }
            viewer.render();
        });

        // document.getElementById('labelSelect').addEventListener('change', function (e) {
        //     updateAtomLabels(e.target.value);
        //     viewer.render();
        // });

        // Previous event handlers and functions remain the same
        frameSlider.addEventListener('input', e => {
            updateFrame(parseInt(e.target.value));
        });

        document.getElementById('styleSelect').addEventListener('change', e => {
            updateStyle(e.target.value);
        });

        document.getElementById('bgColor').addEventListener('change', e => {
            updateBgColor(e.target.value);
        });

        function updateStyle(style) {
            const styleConfig = style === "ball and stick"
                ? { stick: { radius: 0.125 }, sphere: { scale: 0.22 } }
                : { [style]: {} };

            model.setStyle({}, styleConfig);
            viewer.render();
        }

        function updateBgColor(color) {
            viewer.setBackgroundColor(color);
            viewer.render();
        }

        const FRAME_SWITCH_INTERVAL = 100;
        const LONG_PRESS_DELAY = 500;
        let frameIntervalId = null;
        let longPressTimeoutId = null;

        function updateFrame(frame) {
            frame = (frame + frameCount) % frameCount;
            frameSlider.value = frame;

            viewer.setFrame(frame)
                .then(() => {
                    // const labelStyle = document.getElementById('labelSelect').value;
                    // if (labelStyle !== 'none') {
                    //     updateAtomLabels(labelStyle);
                    // }

                    if (axisVisible) {
                        addAxis();
                    }

                    viewer.render();
                    updateFrameLabel(frame);
                });
        }

        function startFrameChange(direction) {
            if (frameIntervalId) return;

            const currentFrame = parseInt(frameSlider.value);
            updateFrame(currentFrame + direction);

            frameIntervalId = setInterval(() => {
                const currentFrame = parseInt(frameSlider.value);
                updateFrame(currentFrame + direction);
            }, FRAME_SWITCH_INTERVAL);
        }

        function stopFrameChange() {
            if (frameIntervalId) {
                clearInterval(frameIntervalId);
                frameIntervalId = null;
            }
            if (longPressTimeoutId) {
                clearTimeout(longPressTimeoutId);
                longPressTimeoutId = null;
            }
        }

        function updateFrameLabel(frame) {
            document.getElementById('frameLabel').textContent =
                `${frame + 1}/${frameCount}`;
        }

        document.getElementById('prevFrame').addEventListener('mousedown', function () {
            longPressTimeoutId = setTimeout(() => startFrameChange(-1), LONG_PRESS_DELAY);
            const currentFrame = parseInt(frameSlider.value);
            updateFrame(currentFrame - 1);
        });

        document.getElementById('nextFrame').addEventListener('mousedown', function () {
            longPressTimeoutId = setTimeout(() => startFrameChange(1), LONG_PRESS_DELAY);
            const currentFrame = parseInt(frameSlider.value);
            updateFrame(currentFrame + 1);
        });

        ['mouseup', 'mouseleave'].forEach(eventName => {
            document.getElementById('prevFrame').addEventListener(eventName, stopFrameChange);
            document.getElementById('nextFrame').addEventListener(eventName, stopFrameChange);
        });

        ['touchstart', 'touchend', 'touchcancel'].forEach(eventName => {
            document.getElementById('prevFrame').addEventListener(eventName, function (e) {
                e.preventDefault();
                if (eventName === 'touchstart') {
                    longPressTimeoutId = setTimeout(() => startFrameChange(-1), LONG_PRESS_DELAY);
                    const currentFrame = parseInt(frameSlider.value);
                    updateFrame(currentFrame - 1);
                } else {
                    stopFrameChange();
                }
            });

            document.getElementById('nextFrame').addEventListener(eventName, function (e) {
                e.preventDefault();
                if (eventName === 'touchstart') {
                    longPressTimeoutId = setTimeout(() => startFrameChange(1), LONG_PRESS_DELAY);
                    const currentFrame = parseInt(frameSlider.value);
                    updateFrame(currentFrame + 1);
                } else {
                    stopFrameChange();
                }
            });
        });


        // Set initial states
        updateStyle("ball and stick");
        updateBgColor("#333333");
        viewer.zoomTo();
        viewer.render();
        updateFrameLabel(0);
